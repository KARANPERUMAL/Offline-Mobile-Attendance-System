# Railway deployment configuration
# This tells Railway where the Dockerfile is and sets the build context

[build]
builder = "DOCKERFILE"
dockerfilePath = "attendance-system/backend/Dockerfile"

[deploy]
startCommand = "java -XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0 -jar app.jar"
healthcheckPath = "/api/auth/health"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
