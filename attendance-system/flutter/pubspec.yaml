name: attendance_app
description: Offline LAN-Based Mobile Attendance System

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # HTTP
  dio: ^5.4.0

  # Local Database
  sqflite: ^2.3.0
  path: ^1.9.0

  # Secure Storage (for JWT)
  flutter_secure_storage: ^9.0.0

  # Shared Preferences
  shared_preferences: ^2.2.2

  # UI
  flutter_spinkit: ^5.2.0
  fluttertoast: ^8.2.4
  google_fonts: ^6.1.0

  # LAN / Network
  shelf: ^1.4.1
  shelf_router: ^1.1.4
  network_info_plus: ^5.0.0
  connectivity_plus: ^5.0.2

  # Utilities
  uuid: ^4.3.3
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.7
  riverpod_generator: ^2.3.9
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
