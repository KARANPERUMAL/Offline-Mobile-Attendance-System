# ===========================
# Server Configuration
# ===========================
server.port=${PORT:8080}
server.address=0.0.0.0

# ===========================
# Database Configuration
# ===========================
# Uses environment variables in production (Railway), falls back to local for dev
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/attendance_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:your_local_password_here}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ===========================
# JWT Configuration
# ===========================
app.jwt.secret=${JWT_SECRET:ThisIsAVeryLongSecretKeyForJWTTokenGenerationThatShouldBeAtLeast256BitsLong}
app.jwt.expiration.admin=86400000
app.jwt.expiration.teacher=2592000000
app.jwt.expiration.student=2592000000
app.jwt.expiration=2592000000

# ===========================
# App Configuration
# ===========================
app.otp.expiry-seconds=60

# ===========================
# CORS - Allow showcase page & Swagger
# ===========================
spring.web.cors.allowed-origins=*
